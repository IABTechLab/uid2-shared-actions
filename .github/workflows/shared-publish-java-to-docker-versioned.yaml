name: Shared Publish Docker
on:
  workflow_call:
    inputs:
      release_type:
        description: The type of version number to return. Must be one of [Snapshot, Patch, Minor or Major]
        required: true
        type: string
      java_version:
        description: The version of Java to use to compile the JAR. Defaults to 11
        type: string
        default: '11'
      publish_vulnerabilities:
        description: If true, will attempt to publish any vulnerabilities to GitHub. Defaults to true. Set to false for private repos.
        type: string
        default: 'true'
      version_number_input:
        description: If set, the version number will not be incremented and the given number will be used.
        type: string
        default: ''
      force_release:
        description: If 'yes', will force the creation a release, if 'no' will not create a release. 'branch' will use release_type and the branch to determine if a release should be created.
        type: string
        default: 'branch'
      skip_tests:
        description: If true, will skip tests when packaging JAR. Defaults to false. Set to true for test-only repos.
        type: boolean
        default: false
      vulnerability_severity:
        description: The severity to fail the workflow if such vulnerability is detected. DO NOT override it unless a Jira ticket is raised. Must be one of ['CRITICAL', 'CRITICAL,HIGH' or 'CRITICAL,HIGH,MEDIUM'] (without space in between).
        type: string
        default: 'CRITICAL,HIGH'
      working_dir:
        description: The path to the pom.xml and Dockerfile.
        type: string
        default: '.'
      append_image_name:
        description: Additional string to append to the image name.
        type: string
        default: ''
      merge_environment:
        description: GitHub Environment to use for accessing the merge token. Leave empty to use the default GITHUB_TOKEN.
        type: string
        default: ''
      attestation_enabled:
        description: If false, skips SLSA build-provenance attestation + verification. Defaults to true.
        type: boolean
        default: true
    outputs:
      version_number_output:
        description: The complete version number 
        value: ${{ jobs.buildImage.outputs.jar_version }}
      image_tag:
        description: The tag used to describe the image in docker
        value: ${{ jobs.buildImage.outputs.image_tag }}
    secrets:
      GH_MERGE_TOKEN:
        description: PAT used by commit_pr_and_merge to bypass branch protection on the auto-PR. Falls back to GITHUB_TOKEN if not set.
        required: false
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  buildImage:
    name: Build Image
    runs-on: ubuntu-latest
    environment: ${{ inputs.merge_environment }}
    permissions:
      contents: write
      security-events: write
      packages: write
      pull-requests: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      jar_version: ${{ steps.version.outputs.new_version }}
      image_tag: ${{ steps.updatePom.outputs.image_tag }}
    steps:
      - name: Check branch and release type
        id: checkRelease
        uses: IABTechLab/uid2-shared-actions/actions/check_branch_and_release_type@v3
        with:
          release_type: ${{ inputs.release_type }}
          force_release: ${{ inputs.force_release }}

      - name: Show Context
        run: |
          printenv
          echo "$GITHUB_CONTEXT"
        shell: bash
        env: 
            GITHUB_CONTEXT: ${{ toJson(github) }}
            IS_RELEASE: ${{ steps.checkRelease.outputs.is_release }}
  
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java_version }}

      - name: Checkout full history on Main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ inputs.version_number_input == ''}}
        with:
          # git-restore-mtime requires full git history. The default fetch-depth value (1) creates a shallow checkout.
          fetch-depth: 0

      - name: Checkout full history at tag v${{ inputs.version_number_input }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ inputs.version_number_input != ''}}
        with:
          ref: v${{ inputs.version_number_input }}
          # git-restore-mtime requires full git history. The default fetch-depth value (1) creates a shallow checkout.
          fetch-depth: 0

      - name: Restore timestamps
        uses: thetradedesk/git-restore-mtime-action@a6059d100648f8027eb1af5e6e6fd6e1328083af # v1.3

      - name: Set version number
        id: version
        uses: IABTechLab/uid2-shared-actions/actions/version_number@v3
        with:
          type: ${{ inputs.release_type }}
          version_number: ${{ inputs.version_number_input }}
          branch_name: ${{ github.ref }}

      - name: Update pom.xml
        id: updatePom
        run: |
          pushd ${{ inputs.working_dir }}
          current_version=$(grep -o '<version>.*</version>' pom.xml | head -1 | sed 's/<version>\(.*\)<\/version>/\1/')
          new_version=${{ steps.version.outputs.new_version }} 
          mvn versions:set versions:commit -DnewVersion="$new_version"
          echo "Version number updated from $current_version to $new_version"
          echo "image_tag=${{ steps.version.outputs.new_version }}" >> $GITHUB_OUTPUT
          popd

      - name: Package JAR
        id: package
        run: |
          pushd ${{ inputs.working_dir }}
          cat pom.xml
          if [[ "${{ inputs.skip_tests }}" == "false" ]]; then
            mvn -B package -P default
          else
            mvn -B package -P default -DskipTests
          fi
          echo "jar_version=$(mvn help:evaluate -Dexpression=project.version | grep -e '^[1-9][^\[]')" >> $GITHUB_OUTPUT
          echo "git_commit=$(git show --format="%h" --no-patch)" >> $GITHUB_OUTPUT
          popd

      - name: Commit pom.xml and version.json
        if: ${{ inputs.version_number_input == '' && steps.checkRelease.outputs.is_release != 'true' }}
        uses: IABTechLab/uid2-shared-actions/actions/commit_pr_and_merge@v3
        with:
          add: '${{inputs.working_dir}}/pom.xml version.json'
          message: 'Released ${{ inputs.release_type }} version: ${{ steps.version.outputs.new_version }}'
          github_token: ${{ inputs.merge_environment != '' && secrets.GH_MERGE_TOKEN || '' }}

      - name: Commit pom.xml, version.json and set tag
        if: ${{ inputs.version_number_input == '' && steps.checkRelease.outputs.is_release == 'true' }}
        uses: IABTechLab/uid2-shared-actions/actions/commit_pr_and_merge@v3
        with:
          add: '${{inputs.working_dir}}/pom.xml version.json'
          message: 'Released ${{ inputs.release_type }} version: ${{ steps.version.outputs.new_version }}'
          tag: v${{ steps.version.outputs.new_version }}
          github_token: ${{ inputs.merge_environment != '' && secrets.GH_MERGE_TOKEN || '' }}

      - name: Log in to the Docker container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ inputs.append_image_name }}
          tags: |
            type=raw,value=${{ steps.updatePom.outputs.image_tag }}
            type=raw,value=${{ steps.checkRelease.outputs.not_snapshot == 'true' && 'latest' || '' }}

      - name: Extract First Image Tag
        id: extractImageTag
        run: |
          FIRST_TAG=${DOCKER_METADATA_OUTPUT_TAGS%%$'\n'*}
          echo "firstTag=$FIRST_TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Lowercase image reference
        id: imageRef
        run: |
          value="$(printf '%s' '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ inputs.append_image_name }}' | tr '[:upper:]' '[:lower:]')"
          echo "value=${value}" >> "$GITHUB_OUTPUT"

      - name: Build and export to Docker
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{inputs.working_dir}}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JAR_VERSION=${{ steps.version.outputs.new_version }}
            IMAGE_VERSION=${{ steps.version.outputs.new_version }}

      - name: Vulnerability Scan
        uses: IABTechLab/uid2-shared-actions/actions/vulnerability_scan@v3
        with:
          scan_severity: HIGH,CRITICAL
          failure_severity: ${{ inputs.vulnerability_severity }}
          publish_vulnerabilities: ${{ inputs.publish_vulnerabilities }}
          image_ref: ${{ steps.extractImageTag.outputs.firstTag }}
          scan_type: image

      - name: Push to Docker (by digest, untagged)
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{inputs.working_dir}}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ steps.imageRef.outputs.value }},push-by-digest=true,push=true
          build-args: |
            JAR_VERSION=${{ steps.version.outputs.new_version }}
            IMAGE_VERSION=${{ steps.version.outputs.new_version }}

      - name: Attest build provenance
        if: ${{ steps.checkRelease.outputs.not_snapshot == 'true' && inputs.attestation_enabled }}
        uses: IABTechLab/uid2-shared-actions/actions/attest_image@v3
        with:
          subject_name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ inputs.append_image_name }}
          subject_digest: ${{ steps.push.outputs.digest }}

      - name: Promote digest to consumable tag(s)
        shell: bash
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
          SOURCE: ${{ steps.imageRef.outputs.value }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            docker buildx imagetools create -t "$tag" "${SOURCE}@${DIGEST}"
          done <<< "$TAGS"

      - name: Create Release
        uses: IABTechLab/uid2-shared-actions/actions/shared_create_releases@v3
        with:
          is_release: ${{ steps.checkRelease.outputs.is_release }}
          new_version: ${{ steps.version.outputs.new_version }}
          tags: ${{ steps.meta.outputs.tags }}
          image_tag: ${{ steps.updatePom.outputs.image_tag }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_platform: Docker
          draft: 'false'
          prerelease: 'true'

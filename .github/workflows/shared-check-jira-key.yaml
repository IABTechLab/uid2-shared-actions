name: Shared Check Jira Key
# Required-status-check for IABTechLab uid2* repos (UID2-7426).
#
# WHY THIS EXISTS: the UnifiedID2 / European-Unified-ID orgs enforce the Jira-key rule natively
# with a GitHub `commit_message_pattern` ruleset (UID2-7312). IABTechLab is a GitHub *team* plan,
# where commit-metadata ruleset rules are Enterprise-gated and silently never evaluated — so the
# native rule is inert there. This reusable workflow reproduces the same rule as a required status
# check, the only team-plan-compatible mechanism.
#
# WHAT IT CHECKS: the message that will actually land in the immutable default-branch history — the
# squash commit GitHub will produce — must contain a `UID2-<n>` key or a reasoned
# `[no-jira - reason: <reason>]` opt-out. It reconstructs that squash commit from the PR's commits
# and title, rather than trusting the PR title alone (which is NOT what lands for a single-commit PR).
#
# SQUASH-COMPOSITION ASSUMPTION (important): every in-scope repo is configured
# squash_merge_commit_title = COMMIT_OR_PR_TITLE and squash_merge_commit_message = COMMIT_MESSAGES
# (GitHub's default, and what all UID2/EUID gated repos use). The check ASSUMES that config rather
# than reading it, because the workflow GITHUB_TOKEN cannot read squash_merge_commit_* — those
# fields return null without admin access, and `administration` is not a grantable workflow
# `permissions:` key. Under that config the squash commit is: subject = the single commit's first
# line (1-commit PR) or the PR title (multi-commit); body = all commit messages concatenated.
#
# PREREQUISITES before this is wired as a REQUIRED check (UID2-7426 rollout — do not skip):
#   1. Uniform squash config: every gated repo must be COMMIT_OR_PR_TITLE + COMMIT_MESSAGES, else
#      the assumption above is wrong for that repo. uid2-android-sdk is currently PR_TITLE/PR_BODY —
#      normalize it (or exclude it) before wiring its caller. Enforce the setting (terraform /
#      go-live merge-method audit) so a repo can't silently drift out of the assumption.
#   2. require-squash-merge must be ACTIVE. In-scope repos are NOT squash-only yet (it is still in
#      evaluate, and merge-commit/rebase remain enabled), so until it flips a "Rebase and merge" can
#      land raw keyless commits even with this check green. Squash-only makes the check mean what it says.
#   3. The CI release flow (actions/commit_pr_and_merge, UID2-7400) merges via an immediate merge API
#      call that does NOT wait for checks — a required check makes that PUT return 405. Before
#      flipping to required, add a wait-for-checks/retry to commit_pr_and_merge, or bypass the release
#      actor on the required_status_checks rule (compliance-safe: its commits already carry the marker).
on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  check-jira-key:
    runs-on: ubuntu-latest
    steps:
      - name: Require a UID2 Jira key or reasoned opt-out in the landed squash commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          export LC_ALL=C.UTF-8   # grep -P (PCRE) errors under a non-UTF-8 locale (matches commit_pr_and_merge)

          # SINGLE SOURCE OF TRUTH regex. Keep in sync with local.jira_key_pattern in
          # uid2-okta-configuration (github_repo_rulesets / github_rulesets) and the self-assertion
          # in actions/commit_pr_and_merge. The \b prevents FOOUID2-1 from matching; a blank
          # [no-jira - reason: ] fails because \S requires a non-space reason.
          PATTERN='\bUID2-[0-9]+|\[no-jira - reason:\s*\S[^\]]*\]'

          if [ -z "${PR_NUMBER:-}" ] || [ "${PR_NUMBER}" = "null" ]; then
            echo "::error::shared-check-jira-key must be called from a pull_request-triggered workflow (no PR number in context)."
            exit 1
          fi

          # Title fetched LIVE (not from the frozen github.event payload) so a manual re-run after a
          # title edit re-evaluates the CURRENT title. Callers should also trigger on
          # types: [opened, edited, synchronize, reopened] so title edits auto-re-check.
          PR_TITLE=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.title // ""')

          COMMITS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/commits?per_page=100")
          N=$(printf '%s' "$COMMITS" | jq 'length')
          ALL_MSGS=$(printf '%s' "$COMMITS" | jq -r '.[].commit.message')
          # GitHub's squash title for a 1-commit PR is the commit's FIRST LINE, not the whole message.
          FIRST_LINE=$(printf '%s' "$COMMITS" | jq -r '(.[0].commit.message // "") | split("\n")[0]')

          # Reconstruct the squash commit under the assumed config (see header):
          #   subject: 1-commit PR -> that commit's first line; multi-commit -> the PR title.
          #   body:    all commit messages (COMMIT_MESSAGES).
          if [ "$N" -eq 1 ]; then SUBJECT="$FIRST_LINE"; else SUBJECT="$PR_TITLE"; fi
          BODY="$ALL_MSGS"

          # Search subject and body INDEPENDENTLY — never concatenate. For a single-commit PR the
          # subject (first line) is contained in the body (its full message); concatenating would
          # create a spurious cross-boundary match (e.g. a blank "[no-jira - reason: ]" pairing its
          # own "]" with the "]" of the body copy).
          if printf '%s' "$SUBJECT" | grep -Pq "$PATTERN" || printf '%s' "$BODY" | grep -Pq "$PATTERN"; then
            echo "✓ A UID2-<n> key or reasoned [no-jira - reason: …] opt-out is present in the commit that will land on ${GITHUB_REF_NAME:-the default branch}."
            exit 0
          fi

          # Fail-closed with guidance specific to what lands (single- vs multi-commit).
          if [ "$N" -eq 1 ]; then
            WHATLANDS="your **single commit's message**"
            FIX="reword the commit (e.g. \`git commit --amend\`) to include it"
          else
            WHATLANDS="the **PR title** or one of your **commit messages**"
            FIX="put it in the PR title or a commit message"
          fi
          echo "::error title=Missing Jira key::The squash commit that will merge to the default branch has no UID2-<n> key and no reasoned opt-out."
          {
            echo "### ❌ Jira-key check failed"
            echo ""
            echo "Every change merged to the default branch must carry, **in the commit that lands**, either a \`UID2-<n>\` key (uppercase) or a reasoned \`[no-jira - reason: <reason>]\` opt-out (lowercase, reason mandatory)."
            echo ""
            echo "Your PR has **${N}** commit(s), so what lands is ${WHATLANDS}."
            echo ""
            echo "Fix: ${FIX}."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

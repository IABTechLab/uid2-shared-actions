name: Smoke test shared_create_releases (TEMPORARY)
# Temporary smoke harness for UID2-6762 / PR #229. Exercises each platform
# branch of actions/shared_create_releases against an existing v3 tag so we
# can inspect the resulting draft-release body before merge. Delete this file
# and any draft releases it produces once verification is complete.

on:
  push:
    branches:
      - jon-UID2-6762-consolidate-release-notes
    paths:
      - .github/workflows/smoke-create-releases.yaml

env:
  TO_TAG_VERSION: '3.82'

jobs:
  smoke:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        platform: [Docker, Maven, PyPI, NuGet, iOS]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Smoke shared_create_releases (${{ matrix.platform }})
        uses: ./actions/shared_create_releases
        with:
          is_release: 'true'
          new_version: ${{ env.TO_TAG_VERSION }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_platform: ${{ matrix.platform }}
          # Mock inputs — only consumed by the matching platform branch:
          tags: 'ghcr.io/iabtechlab/uid2-smoke-fake:smoke'
          image_tag: 'uid2-smoke-fake:smoke'
          repo: ${{ matrix.platform == 'NuGet' && 'UID2.Client' || 'uid2-smoke-fake' }}

      - name: Tag draft and dump body for ${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          # Drafts have no tag — `gh release view "v..."` returns the published
          # release. Fetch the latest draft by ID via the API instead.
          release_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases" \
            --jq "[.[] | select(.draft and (.name | startswith(\"v${TO_TAG_VERSION}\")))] | sort_by(.created_at) | last | .id")
          echo "Draft release id: $release_id"
          # Prepend a marker that delete_draft_releases skips ("--editing--"),
          # and rename the draft so each platform's smoke draft is preserved
          # for review across matrix iterations.
          body=$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" --jq .body)
          marked_body=$'--editing--\n[smoke '"$PLATFORM"$']\n\n'"$body"
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -f name="v${TO_TAG_VERSION} (smoke ${PLATFORM})" \
            -f body="$marked_body" \
            --jq '"Patched draft: \(.html_url)"'
          echo "=== Draft release body (${PLATFORM}) ==="
          echo "$body"
          echo "=== end ==="

name: TEMP smoke - UID2-7069 (delete after capture)

# Throwaway smoke harness for PR #233. Verifies on a real Linux runner:
#   1. shared_create_releases validation guard rejects an invalid publish_platform.
#   2. shared_create_releases validation guard accepts each canonical platform.
#   3. The composite's Prepare-changelog-template bash + jq pipeline produces
#      valid configurationJson for every platform.
#
# Deliberately does NOT invoke the composite with is_release: 'true' because
# delete_draft_releases (called inside the composite) deletes ALL draft
# releases in the repo — would clobber any unreleased drafts sitting in
# uid2-shared-actions. The standalone template-prep job (3) covers the
# rendering on Linux without touching releases.
#
# Pattern matches UID2-7041 smoke commits: add, capture run, delete.

on:
  push:
    branches: [jn-UID2-7069-harden-shared-create-releases]
  workflow_dispatch:
    inputs:
      run_destructive_e2e:
        description: 'Also run the destructive is_release=true end-to-end (snapshots and restores all draft releases; creates and deletes a v0.0.0-smoke tag). Only set true when you intend to actually exercise the full composite.'
        type: boolean
        default: false

jobs:
  validate_rejects_bad_platform:
    name: Validation guard rejects invalid platform (expected to fail)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Composite with publish_platform=docker (lowercase, INVALID)
        uses: ./actions/shared_create_releases
        with:
          is_release: 'false'
          new_version: 0.0.0-smoke
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_platform: docker

  validate_accepts_canonical_platforms:
    name: Validation guard accepts ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [Docker, Maven, PyPI, NuGet, iOS]
    steps:
      - uses: actions/checkout@v4
      - name: Composite with publish_platform=${{ matrix.platform }} (is_release=false)
        uses: ./actions/shared_create_releases
        with:
          is_release: 'false'
          new_version: 0.0.0-smoke
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_platform: ${{ matrix.platform }}

  # Path C: run the new Extract bash logic from each publish workflow
  # against real consumer-repo fixtures, without actually publishing.
  # Catches drift between the assumed package shape and what real repos use
  # (e.g. uid2-client-python publishes "uid2_client" with an underscore, not
  # "uid2-client" — exactly the kind of mismatch the new tomllib parser
  # would have to handle right).
  extract_maven_artifactid:
    name: Extract Maven artifactId from uid2-attestation-aws fixture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout uid2-attestation-aws (fixture)
        uses: actions/checkout@v4
        with:
          repository: IABTechLab/uid2-attestation-aws
          ref: main
          path: fixture
      - name: Set up JDK 11 (matches consumer's default)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - name: Run the new Extract Maven artifactId logic
        run: |
          set -euo pipefail
          # Same command used in shared-publish-to-maven-versioned.yaml.
          # Consumer passes working_dir=attestation-aws, so the pom lives at
          # fixture/attestation-aws/pom.xml here.
          artifact_id=$(mvn -B -f fixture/attestation-aws/pom.xml help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          echo "Extracted artifactId: $artifact_id"
          test "$artifact_id" = "attestation-aws"
          echo "OK: matches expected 'attestation-aws'"

  extract_pypi_name:
    name: Extract PyPI name from uid2-client-python fixture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout uid2-client-python (fixture)
        uses: actions/checkout@v4
        with:
          repository: IABTechLab/uid2-client-python
          ref: main
          path: fixture
      - name: Run the new tomllib-based PyPI name extraction
        run: |
          set -euo pipefail
          # Same command used in shared-publish-to-pypi-versioned.yaml.
          name=$(python3 -c "import sys, tomllib; print(tomllib.load(open(sys.argv[1], 'rb'))['project']['name'])" fixture/pyproject.toml)
          echo "Extracted name: $name"
          # uid2-client-python publishes as 'uid2_client' (underscore) — NOT
          # 'uid2-client' as one might guess from the repo name. The new
          # tomllib parser correctly returns whatever [project].name says.
          test "$name" = "uid2_client"
          echo "OK: matches expected 'uid2_client'"

  extract_nuget_id:
    name: Extract NuGet id from uid2-client-net fixture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout uid2-client-net (fixture)
        uses: actions/checkout@v4
        with:
          repository: IABTechLab/uid2-client-net
          ref: main
          path: fixture
      - name: Install xmllint (libxml2-utils not preinstalled on ubuntu-latest)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libxml2-utils
      - name: Run the new xmllint-based NuGet id extraction
        run: |
          set -euo pipefail
          # Same command used in shared-publish-to-nuget-versioned.yaml.
          package_id=$(xmllint --xpath 'string(//*[local-name()="package"]/*[local-name()="metadata"]/*[local-name()="id"])' fixture/UID2.Client.nuspec)
          echo "Extracted package id: $package_id"
          test "$package_id" = "UID2.Client"
          echo "OK: matches expected 'UID2.Client'"

  render_template_on_linux:
    name: Render template on Linux for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [Docker, Maven, PyPI, NuGet, iOS]
    steps:
      - uses: actions/checkout@v4
      - name: Extract and run composite's template-prep block
        env:
          PLATFORM: ${{ matrix.platform }}
          REPO: smoke-pkg
          VERSION: 0.0.0-smoke
          TAGS: ghcr.io/smoke/img:0.0.0
          IMAGE_TAG: ghcr.io/smoke/img@sha256:deadbeef
        run: |
          set -euo pipefail
          # Pull the case-statement block live from action.yaml. awk grabs
          # everything between `case "$PLATFORM" in` and the matching `esac`,
          # then sed strips the 8-column YAML indent so the heredoc EOF
          # markers sit at bash column 0.
          awk '/^[[:space:]]*case "\$PLATFORM" in[[:space:]]*$/,/^[[:space:]]*esac[[:space:]]*$/' \
            actions/shared_create_releases/action.yaml \
            | sed 's/^        //' > /tmp/case.sh

          # Compose the standalone script: the extracted case block, then the
          # same placeholder substitution + jq invocation the composite uses.
          {
            echo 'set -euo pipefail'
            cat /tmp/case.sh
            cat <<'TAIL'
          template="${template//__TAGS__/$TAGS}"
          template="${template//__IMAGE_TAG__/$IMAGE_TAG}"
          template="${template//__REPO__/$REPO}"
          template="${template//__VERSION__/$VERSION}"
          config=$(jq -nc --arg t "$template" --arg p ' - #{{TITLE}} - ( PR: ##{{NUMBER}} )' '{template: $t, pr_template: $p}')
          echo "--- configurationJson ---"
          echo "$config"
          echo
          echo "--- validity check ---"
          echo "$config" | jq -e '.template | length > 0' >/dev/null && echo "OK: non-empty template, valid JSON"
          echo
          echo "--- decoded template ---"
          echo "$config" | jq -r '.template'
          TAIL
          } > /tmp/run.sh
          bash /tmp/run.sh

  # End-to-end coverage of the composite's is_release=true path: the only
  # smoke that actually invokes mikepenz, Delete Draft Releases, and Create
  # Release in sequence. Destructive (it deletes all draft releases as a
  # side effect of how the composite works), so it snapshots them before-
  # hand and restores them in an `if: always()` cleanup step.
  #
  # workflow_dispatch only — do NOT auto-run on push. Run manually:
  #   gh workflow run smoke-UID2-7069.yaml \
  #     --ref jn-UID2-7069-harden-shared-create-releases \
  #     -f run_destructive_e2e=true
  #
  # Covers what the standalone render_template_on_linux jobs can't: the
  # GHA $GITHUB_OUTPUT plumbing between Prepare-changelog-template and
  # mikepenz, mikepenz's parsing of the new configurationJson string, and
  # the body interpolation into softprops/action-gh-release.
  end_to_end_is_release_true:
    name: End-to-end composite (is_release=true, Maven, snapshot+restore)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_destructive_e2e }}
    runs-on: ubuntu-latest
    permissions:
      contents: write  # tag operations + Create Release + Delete Draft Releases
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need tags for mikepenz to compute a diff

      - name: Cleanup any leftover v0.0.0-smoke tag from a previous failed run
        run: |
          git push --delete origin v0.0.0-smoke 2>/dev/null || true
          git tag -d v0.0.0-smoke 2>/dev/null || true

      - name: Pick fromTag (5th-newest v-prefixed tag — needs merged PRs in range)
        id: pick_tag
        run: |
          set -euo pipefail
          # If we use the newest tag as fromTag and HEAD as toTag with HEAD
          # being a feature branch with no merged PRs since the newest tag,
          # mikepenz hits its empty_template fallback ("- no changes") and
          # the entire platform template gets discarded. To exercise the
          # template-substitution path, pick a tag several releases back so
          # there are guaranteed merged PRs in the range.
          from_tag=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -5 | tail -1)
          if [ -z "$from_tag" ]; then
            # Fallback to plain v[0-9]+ pattern if SemVer didn't match
            from_tag=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | head -5 | tail -1)
          fi
          if [ -z "$from_tag" ]; then
            echo "ERROR: no v-prefixed tag found to use as fromTag" >&2
            exit 1
          fi
          merges=$(git log "$from_tag..HEAD" --merges --oneline | wc -l)
          echo "Using fromTag=$from_tag (merged PRs in range: $merges)"
          if [ "$merges" -lt 1 ]; then
            echo "WARNING: no merged PRs in $from_tag..HEAD — mikepenz will fall back to empty_template and the body verification will fail." >&2
          fi
          echo "from_tag=$from_tag" >> "$GITHUB_OUTPUT"

      - name: Create temporary v0.0.0-smoke tag pointing at HEAD
        run: |
          git tag v0.0.0-smoke
          git push origin v0.0.0-smoke

      - name: Snapshot existing draft releases
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const drafts = (await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            })).data.filter(r => r.draft);
            const snapshot = drafts.map(d => ({
              name: d.name,
              tag_name: d.tag_name,
              target_commitish: d.target_commitish,
              body: d.body,
              prerelease: d.prerelease,
              draft: true,
            }));
            require('fs').writeFileSync(
              process.env.GITHUB_WORKSPACE + '/drafts-snapshot.json',
              JSON.stringify(snapshot),
            );
            core.info(`Snapshotted ${snapshot.length} draft release(s)`);

      - name: Run composite with is_release=true publish_platform=Maven
        uses: ./actions/shared_create_releases
        with:
          is_release: 'true'
          new_version: 0.0.0-smoke
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_platform: Maven
          repo: smoke-pkg
          from_tag: ${{ steps.pick_tag.outputs.from_tag }}

      - name: Verify smoke draft release was created with Maven template content
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const releases = (await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            })).data;
            const smoke = releases.find(r => r.draft && r.name === 'v0.0.0-smoke');
            if (!smoke) {
              throw new Error('Smoke draft release v0.0.0-smoke was NOT created by the composite');
            }
            core.info(`Smoke draft id=${smoke.id}`);
            core.info(`Body (first 1000 chars):\n${(smoke.body || '').slice(0, 1000)}`);
            if (!smoke.body || smoke.body.length === 0) {
              throw new Error('Smoke draft body is EMPTY — template flow broken');
            }
            const expectedMarker = '<artifactId>smoke-pkg</artifactId>';
            if (!smoke.body.includes(expectedMarker)) {
              throw new Error(`Body missing expected marker "${expectedMarker}"`);
            }
            core.info(`OK: Maven template content present in draft body`);

      - name: Cleanup — delete smoke draft + restore snapshotted drafts
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            // Delete v0.0.0-smoke draft (it survived the composite, or was
            // never created — either way clean up).
            const releases = (await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            })).data;
            for (const r of releases.filter(r => r.draft && r.name === 'v0.0.0-smoke')) {
              try {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: r.id,
                });
                core.info(`Deleted smoke draft id=${r.id}`);
              } catch (e) {
                core.warning(`Failed to delete smoke draft id=${r.id}: ${e.message}`);
              }
            }
            // Restore snapshotted drafts (Delete Draft Releases nuked them
            // mid-run, so they need to come back).
            const fs = require('fs');
            const path = process.env.GITHUB_WORKSPACE + '/drafts-snapshot.json';
            if (fs.existsSync(path)) {
              const snapshot = JSON.parse(fs.readFileSync(path, 'utf8'));
              for (const d of snapshot) {
                try {
                  await github.rest.repos.createRelease({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...d,
                  });
                  core.info(`Restored draft: ${d.name || d.tag_name}`);
                } catch (e) {
                  core.warning(`Failed to restore draft ${d.name || d.tag_name}: ${e.message}`);
                }
              }
              core.info(`Restore pass complete (${snapshot.length} draft(s) attempted)`);
            } else {
              core.warning('drafts-snapshot.json not found — snapshot step likely failed; no restore possible');
            }

      - name: Delete temporary v0.0.0-smoke tag
        if: always()
        run: |
          git push --delete origin v0.0.0-smoke 2>/dev/null || true

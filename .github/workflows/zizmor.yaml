name: Zizmor Scan

on:
  pull_request:
    # Trigger on changes to anything zizmor scans: workflows under .github/ and the
    # composite actions this repo ships under actions/. Keep in sync with scan_paths.
    paths:
      - '.github/**'
      - 'actions/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    # Bare call: severity floors inherit from the shared workflow's central
    # defaults (report-only, High) and can be overridden per-repo via the
    # ZIZMOR_MIN_SEVERITY / ZIZMOR_FAIL_SEVERITY Actions variables — no PR needed.
    uses: ./.github/workflows/shared-zizmor-scan.yaml

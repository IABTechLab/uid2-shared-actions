name: Zizmor Scan

on:
  pull_request:
    # Trigger on changes to anything zizmor scans: workflows under .github/ and the
    # composite actions this repo ships under actions/. Keep in sync with scan_paths.
    paths:
      - '.github/**'
      - 'actions/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    uses: ./.github/workflows/shared-zizmor-scan.yaml
    with:
      # Gate on High-severity findings: the repo reached zero High in PRs
      # #249-#251, so a red check now means a genuine new High finding.
      fail_severity: high

name: Shared Pipeline to build and publish JAR Packages to Maven Repos
on:
  workflow_call:
    inputs:
      release_type:
        description: The type of version number to return. Must be one of [Snapshot, Patch, Minor or Major]
        required: true
        type: string
      publish_to_maven:
        description: 'True to publish the artifacts to maven repository, false to skip the step'
        default: true
        required: false
        type: boolean
      java_version:
        type: string
        default: '11'
      publish_vulnerabilities:
        type: string
        default: 'true'
      working_dir:
        description: The path to the directory for which the version should be determined.
        type: string
        default: '.'
      vulnerability_failure_severity:
        description: The severity to fail the workflow if such vulnerability is detected. DO NOT override it unless a Jira ticket is raised. Must be one of ['CRITICAL', 'CRITICAL,HIGH' or 'CRITICAL,HIGH,MEDIUM'] (without space in between).
        type: string
        default: 'CRITICAL,HIGH'
      skip_tests:
        description: If true, will skip tests when compiling. Defaults to false. Set to true for repos without tests.
        type: boolean
        default: false
      merge_environment:
        description: GitHub Environment to use for accessing the merge token. Leave empty to use the default GITHUB_TOKEN.
        type: string
        default: ''
 
env:
  REPO: ${{ github.event.repository.name }}

jobs:
  release:
    # The release/pre-release boolean is inlined here (rather than referencing
    # steps.checkRelease.outputs.is_release) because job-level expressions are
    # evaluated before any step runs. Every other "is this a release?" check
    # in this file uses steps.checkRelease.outputs.is_release — keep this in
    # sync if the condition ever changes. See UID2-7069.
    name: ${{ ((inputs.release_type == 'Major' || inputs.release_type == 'Minor' || inputs.release_type == 'Patch') && (github.event.repository.default_branch == github.ref_name )) && 'Create Release' || 'Publish Pre-release' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.merge_environment }}
    permissions:
      pull-requests: write
      contents: write
      security-events: write
      packages: write
    steps:
      - name: Show Context
        run: |
          printenv
          echo "$GITHUB_CONTEXT"
        shell: bash
        env: 
            GITHUB_CONTEXT: ${{ toJson(github) }}

      - name: Check branch and release type
        id: checkRelease
        uses: IABTechLab/uid2-shared-actions/actions/check_branch_and_release_type@v3
        with:
          release_type: ${{ inputs.release_type }}
    
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Checkout uid2-shared-actions repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: v3
          repository: IABTechLab/uid2-shared-actions
          path: uid2-shared-actions

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java_version }}

      - name: Download key
        uses: IABTechLab/uid2-shared-actions/actions/download_gpg_key@v3
        with:
          key: ${{ secrets.GPG_KEY }}

      - name: Vulnerability Scan
        uses: IABTechLab/uid2-shared-actions/actions/vulnerability_scan@v3
        with:
          scan_severity: HIGH,CRITICAL
          failure_severity: ${{ inputs.vulnerability_failure_severity }}
          publish_vulnerabilities: ${{ inputs.publish_vulnerabilities }}
          scan_type: 'fs'

      - name: Set version number
        id: version
        uses: IABTechLab/uid2-shared-actions/actions/version_number@v3
        with:
          type: ${{ inputs.release_type }}
          branch_name: ${{ github.ref }}
          working_dir: ${{ inputs.working_dir }}

      - name: Update pom.xml
        env:
          # Passed via env rather than expanded into the script: caller-controlled
          # input, expanding it inline is shell injection (zizmor: template-injection).
          WORKING_DIR: ${{ inputs.working_dir }}
        run: |
          current_version=$(grep -o '<version>.*</version>' "${WORKING_DIR}/pom.xml" | head -1 | sed 's/<version>\(.*\)<\/version>/\1/')
          new_version=${{ steps.version.outputs.new_version }}
          sed -i "s/$current_version/$new_version/g" "${WORKING_DIR}/pom.xml"
          echo "Version number updated from $current_version to $new_version"
      - name: Create Maven Settings
        env:
          WORKING_DIR: ${{ inputs.working_dir }}
        run: |
          cd "./${WORKING_DIR}"
          echo "<settings>
                    <servers>
                        <server>
                            <id>central</id>
                            <username>${{ secrets.CENTRAL_SONATYPE_REPO_USERNAME }}</username>
                            <password>${{ secrets.CENTRAL_SONATYPE_REPO_PASSWORD }}</password>
                        </server>
                    </servers>
                </settings>
                " >> settings.xml

      - name: Publish
        if: ${{ inputs.publish_to_maven }}
        env:
          WORKING_DIR: ${{ inputs.working_dir }}
        run: |
          cd "./${WORKING_DIR}"
          mvn -B -s settings.xml -Dgpg.passphrase="${{ secrets.GPG_PASSPHRASE }}" clean deploy

      - name: Compile
        if: ${{ inputs.publish_to_maven != true && inputs.skip_tests == false }}
        env:
          EXTRA_FLAGS: "-s settings.xml -Dgpg.passphrase=\"${{ secrets.GPG_PASSPHRASE }}\""
          WORKING_DIR: ${{ inputs.working_dir }}
        run: |
          cd "./${WORKING_DIR}"
          bash uid2-shared-actions/scripts/compile_java_test_and_verify.sh -s settings.xml -D gpg.passphrase="${{ secrets.GPG_PASSPHRASE }}"

      - name: Compile with no tests
        if: ${{ inputs.publish_to_maven != true && inputs.skip_tests == true }}
        env:
          WORKING_DIR: ${{ inputs.working_dir }}
        run: |
          cd "./${WORKING_DIR}"
          mvn -B -s settings.xml -Dgpg.passphrase="${{ secrets.GPG_PASSPHRASE }}" clean compile -DskipTests

      - name: Commit pom.xml and version.json
        if: ${{ steps.checkRelease.outputs.is_release != 'true' }}
        uses: IABTechLab/uid2-shared-actions/actions/commit_pr_and_merge@v3
        with:
          add: '${{ inputs.working_dir }}/pom.xml ${{ inputs.working_dir }}/version.json'
          message: 'Released ${{ inputs.release_type }} version: ${{ steps.version.outputs.new_version }}'
          github_token: ${{ inputs.merge_environment != '' && secrets.GH_MERGE_TOKEN || '' }}

      - name: Commit pom.xml, version.json and set tag
        if: ${{ steps.checkRelease.outputs.is_release == 'true' }}
        uses: IABTechLab/uid2-shared-actions/actions/commit_pr_and_merge@v3
        with:
          add: '${{ inputs.working_dir }}/pom.xml ${{ inputs.working_dir }}/version.json'
          message: 'Released ${{ inputs.release_type }} version: ${{ steps.version.outputs.new_version }}'
          tag: v${{ steps.version.outputs.new_version }}
          github_token: ${{ inputs.merge_environment != '' && secrets.GH_MERGE_TOKEN || '' }}

      - name: Extract Maven artifactId
        id: package_name
        if: ${{ steps.checkRelease.outputs.is_release == 'true' }}
        env:
          WORKING_DIR: ${{ inputs.working_dir }}
        run: |
          # Maven artifactId comes from pom.xml, not the github repo name
          # (e.g. uid2-attestation-azure repo publishes the `attestation-azure`
          # artifact). Use `mvn help:evaluate` as the canonical source so
          # release-notes install snippets match what `mvn deploy` actually
          # published. Gated on is_release to avoid running on Snapshot builds
          # where shared_create_releases is a no-op.
          artifact_id=$(mvn -B -f "${WORKING_DIR}/pom.xml" help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          if [ -z "$artifact_id" ]; then
            echo "ERROR: could not extract artifactId from ${WORKING_DIR}/pom.xml" >&2
            exit 1
          fi
          echo "Extracted Maven artifactId: $artifact_id"
          echo "name=$artifact_id" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: IABTechLab/uid2-shared-actions/actions/shared_create_releases@v3
        with:
          is_release: ${{ steps.checkRelease.outputs.is_release }}
          new_version: ${{ steps.version.outputs.new_version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_platform: Maven
          repo: ${{ steps.package_name.outputs.name }}

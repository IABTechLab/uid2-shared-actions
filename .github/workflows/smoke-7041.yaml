name: UID2-7041 smoke — tag-after-verify

# Throwaway smoke that exercises the Task 1 flow inline using LOCAL action
# references (./actions/...) so this branch's changes are actually tested
# (not the @v3 alias). Delete after capturing green + forced-failure runs.

on:
  workflow_dispatch:
    inputs:
      force_verify_failure:
        description: If 'true', inject a failure between attest and promote to prove the gate works.
        type: boolean
        default: false

env:
  TEST_IMAGE: ghcr.io/${{ github.repository }}/test-7041
  TEST_TAG: smoke-${{ github.run_id }}

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: lc
        run: |
          IMG="$(printf '%s' "${TEST_IMAGE}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMG}" >> "$GITHUB_OUTPUT"

      - name: Write throwaway Dockerfile
        run: |
          cat > Dockerfile.test-7041 <<'DOCKERFILE'
          FROM alpine:3.20
          RUN echo "uid2-7041 smoke, run $GITHUB_RUN_ID" > /uid2-7041.txt
          DOCKERFILE

      - name: Push by digest (untagged)
        id: push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile.test-7041
          outputs: type=image,name=${{ steps.lc.outputs.image }},push-by-digest=true,push=true

      - name: Assert tag does not yet exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          if docker buildx imagetools inspect "${{ steps.lc.outputs.image }}:${TEST_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag already exists before promote — should not happen."
            exit 1
          fi
          echo "Confirmed: tag does not exist pre-promote."

      - name: Attest image (system under test)
        uses: ./actions/attest_image
        with:
          subject_name: ${{ steps.lc.outputs.image }}
          subject_digest: ${{ steps.push.outputs.digest }}

      - name: Inject forced failure between attest and promote
        if: ${{ inputs.force_verify_failure }}
        run: |
          echo "::error::UID2-7041 forced failure — promote step must be skipped."
          exit 1

      - name: Promote digest to consumable tag (system under test)
        shell: bash
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS: ${{ steps.lc.outputs.image }}:${{ env.TEST_TAG }}
          SOURCE: ${{ steps.lc.outputs.image }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            docker buildx imagetools create -t "$tag" "${SOURCE}@${DIGEST}"
          done <<< "$TAGS"

      - name: Verify the consumable tag resolves and is attested
        if: ${{ !inputs.force_verify_failure }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          docker buildx imagetools inspect "${{ steps.lc.outputs.image }}:${TEST_TAG}" >/dev/null
          gh attestation verify \
            "oci://${{ steps.lc.outputs.image }}:${TEST_TAG}" \
            --owner "${{ github.repository_owner }}" \
            --cert-identity-regex "^https://github\.com/${{ github.repository }}/"
          echo "Smoke green: tag exists and attestation verifies."

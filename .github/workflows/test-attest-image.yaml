name: Test attest_image composite action

# Manually-dispatched smoke test that builds a tiny throwaway image, runs the
# `actions/attest_image` composite action, and verifies the resulting attestation.
# Validates UID2-6764 end-to-end without depending on a real consumer publish.
# Re-run this whenever `actions/attest@v4.x` is bumped or attest_image is changed.

on:
  workflow_dispatch:
  push:
    branches: [bmz-UID2-6764-artifact-attestation]
    paths:
      - .github/workflows/test-attest-image.yaml
      - actions/attest_image/**

env:
  TEST_IMAGE: ghcr.io/${{ github.repository }}/test-attest

jobs:
  smoke:
    name: Smoke-test attest_image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Write throwaway Dockerfile
        run: |
          cat > Dockerfile.test-attest <<'DOCKERFILE'
          FROM alpine:3.20
          RUN echo "uid2-6764 attest_image smoke test, run ${GITHUB_RUN_ID:-local}" > /uid2-6764.txt
          DOCKERFILE

      - name: Build and push test image
        id: push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile.test-attest
          push: true
          tags: ${{ env.TEST_IMAGE }}:run-${{ github.run_id }}

      - name: Attest image (the system under test)
        uses: ./actions/attest_image
        with:
          subject_name: ${{ env.TEST_IMAGE }}
          subject_digest: ${{ steps.push.outputs.digest }}

      - name: Independent re-verify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Verifying ${TEST_IMAGE}@${{ steps.push.outputs.digest }} ..."
          gh attestation verify \
            "oci://${TEST_IMAGE}@${{ steps.push.outputs.digest }}" \
            --owner "${{ github.repository_owner }}" \
            --format json | jq '.[0].verificationResult.signature.certificate | {issuer, subjectAlternativeName, runnerEnvironment}'

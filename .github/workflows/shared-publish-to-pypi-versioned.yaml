name: Shared Pipeline to build and publish Python packages to Pypi
on:
  workflow_call:
    inputs:
      release_type:
        description: The type of version number to return. Must be one of [Patch, Minor or Major]
        required: true
        type: string
      vulnerability_failure_severity:
        description: The severity to fail the workflow if such vulnerability is detected. DO NOT override it unless a Jira ticket is raised. Must be one of ['CRITICAL', 'CRITICAL,HIGH' or 'CRITICAL,HIGH,MEDIUM'] (without space in between).
        type: string
        default: 'CRITICAL,HIGH'
      working_dir:
        description: The path to the directory for which the version should be determined.
        type: string
        default: '.'
      publish_vulnerabilities:
        type: string
        default: "true"
      merge_environment:
        description: GitHub Environment to use for accessing the merge token. Leave empty to use the default GITHUB_TOKEN.
        type: string
        default: ''

env:
  REPO: ${{ github.event.repository.name }}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    environment: ${{ inputs.merge_environment }}
    permissions:
      pull-requests: write
      contents: write
      security-events: write
      packages: write
    steps:
      - name: Show Context
        run: |
          printenv
          echo "$GITHUB_CONTEXT"
        shell: bash
        env: 
            GITHUB_CONTEXT: ${{ toJson(github) }}

      - name: Check branch and release type
        id: checkRelease
        uses: IABTechLab/uid2-shared-actions/actions/check_branch_and_release_type@v3
        with:
          release_type: ${{ inputs.release_type }}
    
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Vulnerability Scan
        uses: IABTechLab/uid2-shared-actions/actions/vulnerability_scan@v3
        with:
          scan_severity: HIGH,CRITICAL
          failure_severity: ${{ inputs.vulnerability_failure_severity }}
          publish_vulnerabilities: ${{ inputs.publish_vulnerabilities }}
          scan_type: 'fs'

      - name: Set version number
        id: version
        uses: IABTechLab/uid2-shared-actions/actions/version_number@v3
        with:
          type: ${{ inputs.release_type }}
          branch_name: ${{ github.ref }}
          working_dir: ${{ inputs.working_dir }}

      - name: Update pyproject.toml
        env:
          # Passed via env rather than expanded into the script: caller-controlled
          # input, expanding it inline is shell injection (zizmor: template-injection).
          WORKING_DIR: ${{ inputs.working_dir }}
        run: |
          OLD_VERSION=`cat "${WORKING_DIR}/pyproject.toml" | grep ^version | cut -d '"' -f 2`
          OLD_VERSION="\"$OLD_VERSION\""
          NEW_VERSION="\"${{ steps.version.outputs.new_version }}\""
          sed -i "s+version = $OLD_VERSION+version = $NEW_VERSION+g" "${WORKING_DIR}/pyproject.toml"

      - name: Build
        run: |
          python3 -m pip install --upgrade build
          python3 -m build

      - name: Publish
        run: |
          python3 -m pip install --upgrade twine
          python3 -m pip install --upgrade packaging
          python3 -m twine upload dist/* -u __token__ -p "${{ secrets.PYPI_API_KEY }}"

      - name: Commit pyproject.toml, version.json and set tag
        uses: IABTechLab/uid2-shared-actions/actions/commit_pr_and_merge@v3
        with:
          add: '${{ inputs.working_dir }}/pyproject.toml ${{ inputs.working_dir }}/version.json'
          message: 'Released ${{ inputs.release_type }} version: ${{ steps.version.outputs.new_version }}'
          tag: v${{ steps.version.outputs.new_version }}
          github_token: ${{ inputs.merge_environment != '' && secrets.GH_MERGE_TOKEN || '' }}

      - name: Extract PyPI package name
        id: package_name
        if: ${{ steps.checkRelease.outputs.is_release == 'true' }}
        env:
          WORKING_DIR: ${{ inputs.working_dir }}
        run: |
          # PyPI package name comes from pyproject.toml, not the github repo name
          # (e.g. uid2-client-python repo publishes the `uid2_client` package).
          # Use tomllib so we correctly handle both single- and double-quoted
          # values, ignore unrelated `name =` keys in earlier tables (e.g.
          # dependency tables), and fail fast if [project].name is missing.
          # Gated on is_release to avoid running on Snapshot builds where
          # shared_create_releases is a no-op.
          #
          # REQUIRES Python 3.11+ (tomllib is stdlib from 3.11). ubuntu-latest
          # currently ships Python 3.12, so this is safe today; if a caller
          # ever forks the workflow onto ubuntu-22.04 (Python 3.10), add an
          # actions/setup-python step before this one or fall back to `tomli`.
          #
          # Assumes PEP 621 layout — i.e. the package name lives at
          # [project].name. Poetry-style projects with [tool.poetry] would
          # need a different key path (e.g. ['tool']['poetry']['name']);
          # the KeyError this would raise is loud but unhelpful. No current
          # PyPI consumer uses Poetry, so leaving the PEP 621 assumption
          # in place.
          name=$(python3 -c "import sys, tomllib; print(tomllib.load(open(sys.argv[1], 'rb'))['project']['name'])" "${WORKING_DIR}/pyproject.toml")
          if [ -z "$name" ]; then
            echo "ERROR: could not extract [project].name from ${WORKING_DIR}/pyproject.toml" >&2
            exit 1
          fi
          echo "Extracted PyPI package name: $name"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: IABTechLab/uid2-shared-actions/actions/shared_create_releases@v3
        with:
          is_release: ${{ steps.checkRelease.outputs.is_release }}
          new_version: ${{ steps.version.outputs.new_version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_platform: PyPI
          repo: ${{ steps.package_name.outputs.name }}

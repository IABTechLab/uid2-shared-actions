name: Create releases
description: Build the release-notes changelog, delete stale draft releases, and create a published GitHub Release (pre-release for services, full Latest for registry packages) for a published artifact. Canonical release-notes pipeline for this repo — every shared publish workflow should call this action rather than inlining mikepenz/release-changelog-builder. Decision and rationale documented in UID2-6762.

inputs:
  is_release:
    description: True if a release should be created (Patch/Minor/Major). When false, the action is a no-op — safe to call unconditionally for Snapshot/pre-release builds.
    default: 'false'
  new_version:
    description: The new version number being released (without leading v).
    required: true
  github_token:
    description: GitHub token used by mikepenz to read merged PRs, by softprops to create the release, and by gh to resolve the previous published tag.
    required: true
  publish_platform:
    description: Must be one of [Docker, Maven, PyPI, NuGet, iOS].
    required: true
  repo:
    description: Package/artifact identifier. Used by Maven (artifactId in the dependency snippet and jar URL), PyPI (pip install target and PyPI page link), and NuGet (package id). Not used by Docker or iOS.
    default: ''
  tags:
    description: Comma-separated docker image tags (Docker only). Typically the output of docker/metadata-action.
    default: ''
  image_tag:
    description: The image reference shown in the release notes as the deploy target (Docker only).
    default: ''
  from_tag:
    description: Optional. Explicit previous tag to build the changelog from. Wins over the computed previous-published tag. Useful when manually backfilling notes for a specific tag range, or when auto-detection is confused by non-sequential tag names (e.g. when v3.7 and v3.70 coexist). Leave empty in normal release flows — the action resolves the previous published release tag automatically.
    default: ''
  prerelease:
    description: 'If ''true'', the release is published as a pre-release (services: built now, deployed/GA later). If ''false'', it is published as a full Latest release (registry packages: GA on publish). Never a draft.'
    default: 'false'

runs:
  using: "composite"

  steps:
    # Fail fast on a typo in publish_platform. Without this guard, an unknown
    # value (e.g. 'docker' lowercase) silently skips every Build Changelog
    # step, lets Delete Draft Releases run, and creates a draft release with
    # an empty body. See UID2-7069.
    #
    # Validation is done in bash (case statement) rather than via
    # `contains(fromJSON([...]), inputs.publish_platform)` because GitHub
    # Actions' contains() is case-INSENSITIVE — `contains(['Docker',...],
    # 'docker')` returns true, so the expression form silently lets the
    # exact typo we're trying to catch slip through. Bash `case` is
    # case-sensitive by default.
    #
    # Intentionally NOT gated on is_release — typos should be loud on
    # Snapshot runs too, so they're caught before someone tries to cut
    # a real release with the same misconfiguration.
    - name: Validate publish_platform
      shell: bash
      env:
        PLATFORM: ${{ inputs.publish_platform }}
      run: |
        case "$PLATFORM" in
          Docker|Maven|PyPI|NuGet|iOS)
            ;;
          *)
            echo "::error::Unsupported publish_platform '$PLATFORM'. Must be one of [Docker, Maven, PyPI, NuGet, iOS]."
            exit 1
            ;;
        esac

    # Build the mikepenz configurationJson for the chosen platform. One step
    # replaces what used to be five near-identical Build X Changelog steps —
    # future changes (mikepenz SHA bump, template tweak) now happen in one
    # place. See UID2-7069.
    - name: Prepare changelog template
      id: changelog_config
      if: ${{ inputs.is_release == 'true' }}
      shell: bash
      env:
        PLATFORM: ${{ inputs.publish_platform }}
        REPO: ${{ inputs.repo }}
        VERSION: ${{ inputs.new_version }}
        TAGS: ${{ inputs.tags }}
        IMAGE_TAG: ${{ inputs.image_tag }}
      run: |
        # Heredocs use quoted EOF so backticks and $ stay literal — no shell
        # expansion inside the template body. We then substitute the four
        # placeholders via bash parameter expansion.
        #
        # Heredoc body lines sit at YAML's common-prefix indent (8 spaces)
        # so YAML's literal-block-scalar dedent leaves them flush-left in
        # the actual bash script — that's what lets the closing EOF marker
        # match. If you re-indent the heredoc body, the heredoc breaks.
        case "$PLATFORM" in
          Docker)
            template=$(cat <<'EOF'
        #{{CHANGELOG}}
        ## Installation
        ```
        docker pull __TAGS__
        ```

        ## Image reference to deploy: 
        ```
        __IMAGE_TAG__
        ```

        ## Changelog
        #{{UNCATEGORIZED}}
        EOF
        )
            ;;
          Maven)
            template=$(cat <<'EOF'
        #{{CHANGELOG}}
        ## Maven
        ```
        <dependency>
            <groupId>com.uid2</groupId>
            <artifactId>__REPO__</artifactId>
            <version>__VERSION__</version>
        </dependency>
        ```

        ## Jar Files
        - [__REPO__-__VERSION__.jar](https://repo1.maven.org/maven2/com/uid2/__REPO__/__VERSION__/__REPO__-__VERSION__.jar)

        ## Changelog
        #{{UNCATEGORIZED}}
        EOF
        )
            ;;
          PyPI)
            template=$(cat <<'EOF'
        #{{CHANGELOG}}
        ## PyPI
        ```
        pip install __REPO__==__VERSION__
        ```

        ## PyPI page
        - [__REPO__ __VERSION__](https://pypi.org/project/__REPO__/__VERSION__/)

        ## Changelog
        #{{UNCATEGORIZED}}
        EOF
        )
            ;;
          NuGet)
            template=$(cat <<'EOF'
        #{{CHANGELOG}}
        ## NuGet
        ```
        dotnet add package __REPO__ --version __VERSION__
        ```

        ## NuGet page
        - [__REPO__ __VERSION__](https://www.nuget.org/packages/__REPO__/__VERSION__)

        ## Changelog
        #{{UNCATEGORIZED}}
        EOF
        )
            ;;
          iOS)
            template=$(cat <<'EOF'
        #{{CHANGELOG}}
        ## Changelog
        #{{UNCATEGORIZED}}
        EOF
        )
            ;;
        esac

        # Placeholder tokens (__TAGS__, __IMAGE_TAG__, __REPO__, __VERSION__)
        # are reserved — no input value should contain them. Substitution is
        # order-dependent: if e.g. $TAGS expanded to literal `__REPO__`, the
        # next line would re-substitute it. All inputs currently come from
        # trusted CI sources (docker/metadata-action outputs, semver), so
        # this is theoretical. Keep the tokens unique-looking if you add
        # more.
        template="${template//__TAGS__/$TAGS}"
        template="${template//__IMAGE_TAG__/$IMAGE_TAG}"
        template="${template//__REPO__/$REPO}"
        template="${template//__VERSION__/$VERSION}"

        # Compact JSON (single line) keeps the step output value on one line —
        # simpler to pass into mikepenz's configurationJson input via a
        # GitHub Actions expression (no multi-line $GITHUB_OUTPUT delimiter
        # needed downstream).
        config=$(jq -nc \
          --arg t "$template" \
          --arg p ' - #{{TITLE}} - ( PR: ##{{NUMBER}} )' \
          '{template: $t, pr_template: $p}')

        echo "json=$config" >> "$GITHUB_OUTPUT"

    # Resolve the previous *published* release tag so the changelog spans from
    # the last release that actually shipped — not just the last git tag. A run
    # that tags but fails to publish leaves no release, so it's skipped here and
    # the next run's changelog self-heals back over the gap. Skipped when
    # from_tag is set (explicit override wins) or empty result (first-ever
    # release) → mikepenz falls back to git-tag auto-detection. See UID2-7340.
    - name: Resolve previous published tag
      id: prev_published
      if: ${{ inputs.is_release == 'true' && inputs.from_tag == '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        # Most recently created release with draft==false (pre-release OR Latest).
        # No --paginate: gh applies --jq per page and concatenates, so map(...) would
        # emit one line per page (>30 releases) and corrupt the output. One page of 100
        # is plenty to find the newest published release at the top of the list.
        tag=$(gh api "repos/${{ github.repository }}/releases?per_page=100" \
          --jq 'map(select(.draft==false)) | .[0].tag_name // ""')
        echo "tag=$tag" >> "$GITHUB_OUTPUT"

    - name: Build changelog
      id: changelog
      if: ${{ inputs.is_release == 'true' }}
      uses: mikepenz/release-changelog-builder-action@348e88fab4c37338b1e803ceb2d4a7a5db6c0833 # v6.2.2
      with:
        toTag: v${{ inputs.new_version }}
        fromTag: ${{ inputs.from_tag != '' && inputs.from_tag || steps.prev_published.outputs.tag }}
        configurationJson: ${{ steps.changelog_config.outputs.json }}
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: Delete Draft Releases
      if: ${{ inputs.is_release == 'true' }}
      uses: IABTechLab/uid2-shared-actions/actions/delete_draft_releases@v3

    - name: Create Release
      if: ${{ inputs.is_release == 'true' }}
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
      with:
        # tag_name must be explicit. softprops defaults it to github.ref_name,
        # which is the dispatch branch (e.g. 'main') — not the version tag.
        # Drafts hid this (a draft carries no tag until manually published), but
        # a published release needs the tag now. The v<version> tag already
        # exists at this point (pushed by commit_pr_and_merge upstream). See
        # UID2-7340.
        tag_name: v${{ inputs.new_version }}
        name: v${{ inputs.new_version }}
        body: ${{ steps.changelog.outputs.changelog }}
        draft: false
        prerelease: ${{ inputs.prerelease }}

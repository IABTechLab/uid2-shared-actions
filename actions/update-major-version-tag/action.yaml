name: Update major version tag
description: Point the major version tag (e.g. v3) at the commit for a full release version (e.g. v3.4), creating it if absent.
inputs:
  version:
    description: 'The full version number of the release'
    required: true
  sha:
    description: 'The SHA of the commit to point the major version tag to. If not provided, it will be looked up from the tag matching the version.'
    required: false
    default: ''
  github_token:
    description: 'Token for the tag write. Pass a v* tag-ruleset bypass token (the UID2SourceAdmin PAT) where the ruleset applies; defaults to GITHUB_TOKEN.'
    required: false
    default: ''
outputs:
  updated_tag:
    description: 'The tag updated (or created) by the script'
    value: ${{ steps.updateTag.outputs.updated_tag }}
runs:
  using: "composite"
  steps:
    - name: Update major version tag
      id: updateTag
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        # Read via process.env rather than expanded into the script source:
        # caller-controlled inputs inside a template literal are JS injection
        # (zizmor: template-injection).
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_SHA: ${{ inputs.sha }}
      with:
        github-token: ${{ inputs.github_token != '' && inputs.github_token || github.token }}
        script: |
          const inputVersion = process.env.INPUT_VERSION;
          const inputSha = process.env.INPUT_SHA;
          const match = /^(v\d+)\.\d[\d\.]*$/.exec(inputVersion);
          if (match == null) {
              // Fail loudly rather than no-op: a silent skip here would leave the
              // major tag (e.g. v3) stale while a new version tag exists.
              core.setFailed(`Version "${inputVersion}" is not in vMAJOR.MINOR form (e.g. v3.4); refusing to move the major tag.`);
          }
          else {
              const majorVersion = match[1];
              let targetSha = inputSha;
              if (!targetSha) {
                  console.log(`SHA not provided, looking up tag ${inputVersion}...`);
                  try {
                      const releaseRef = (await github.rest.git.getRef({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          ref: `tags/${inputVersion}`,
                      })).data;
                      targetSha = releaseRef.object.sha;
                  }
                  catch (error) {
                      console.log(`Could not find a tag for ${inputVersion}, cannot continue.`);
                      throw Error();
                  }
              }
              try {
                  console.log(`Checking for existing tag ${majorVersion}...`);
                  const existingRef = (await github.rest.git.getRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: `tags/${majorVersion}`,
                  })).data;
                  if (existingRef.object.sha == targetSha) {
                      console.log(`Found existing tag ${majorVersion} already matching SHA ${targetSha}, nothing to update.`);
                  }
                  else {
                      console.log(`Found existing tag ${majorVersion} at ${existingRef.object.sha}, updating it to ${targetSha}.`);
                      await github.rest.git.updateRef({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          ref: `tags/${majorVersion}`,
                          sha: targetSha
                      });
                      console.log('Complete.')
                      core.setOutput('updated_tag', majorVersion);
                  }
              } catch (error) {
                  console.log(`No existing tag ${majorVersion}, creating it at ${targetSha}.`)
                  if (error.status == 404) {
                      await github.rest.git.createRef({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          ref: `refs/tags/${majorVersion}`,
                          sha: targetSha
                      });
                      console.log('Complete.')
                      core.setOutput('updated_tag', majorVersion);
                  }
                  else throw error;
              }
          }

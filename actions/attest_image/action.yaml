name: Attest container image
description: |
  Generates a SLSA build-provenance attestation for an OCI image, pushes the
  signed bundle to the registry alongside the image, and verifies it via
  `gh attestation verify`.

inputs:
  subject_name:
    description: Fully qualified image reference (registry/owner/repo[+suffix]).
    required: true
  subject_digest:
    description: OCI manifest digest (sha256:...) emitted by docker/build-push-action.
    required: true

runs:
  using: composite
  steps:
    - name: Lowercase image reference
      id: ref
      shell: bash
      run: |
        value="$(printf '%s' '${{ inputs.subject_name }}' | tr '[:upper:]' '[:lower:]')"
        echo "value=${value}" >> "$GITHUB_OUTPUT"

    - name: Attest build provenance
      uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
      env:
        # Mirrors actions/attest-build-provenance, prevents oversized OCI registry auth-challenge headers triggering HPE_HEADER_OVERFLOW.
        NODE_OPTIONS: --max-http-header-size=32768
      with:
        subject-name: ${{ steps.ref.outputs.value }}
        subject-digest: ${{ inputs.subject_digest }}
        push-to-registry: true

    - name: Verify attestation
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +e
        gh attestation verify \
          "oci://${{ steps.ref.outputs.value }}@${{ inputs.subject_digest }}" \
          --owner "${{ github.repository_owner }}"
        rc=$?
        if [ "$rc" -ne 0 ] && [ "${{ github.event.repository.private }}" = "true" ]; then
          # Private-repo attestations are signed by GitHub's internal Sigstore
          # instance ("GitHub, Inc." CA). gh CLI <= 2.92 rejects this cert
          # chain even with --no-public-good / --bundle-from-oci. Signing and
          # upload succeed (bundle is in both the attestations API and the
          # OCI registry); only the in-CI verify is brittle. Demote to a
          # warning so private consumers don't hard-fail; external verifiers
          # remain authoritative.
          echo "::warning::gh attestation verify failed; private-repo verification is a known gh CLI limitation. Attestation was signed and uploaded successfully."
          exit 0
        fi
        exit "$rc"

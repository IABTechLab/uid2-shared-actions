name: Shared publish to Docker
description: Shared action for publish image to Docker

inputs:
  new_version:
    description: The new version number to publish for the docker repo
    required: true
  image_tag:
    description: The image tag used to extract metadata for Docker
    required: true
  not_snapshot:
    description: True if the release type is not a snapshot or pre-release build
    default: 'false'
  github_token:
    description: The github token to login to Docker container
    required: true
  docker_file:
    description: The Dockerfile used to build and publish Docker image
    default: ''
  publish_vulnerabilities:
    description: If true, will attempt to publish any vulnerabilities to GitHub. Defaults to true. Set to false for private repos.
    default: 'true'
  docker_image_name:
    description: The docker image name
    required: true
  docker_registry:
    description: The docker registry
    required: true
  docker_context:
    description: The docker context
    default: .
  scan_type:
    description: The scan-type for aquasecurity/trivy-action action. Default to a fs scan.
    default: fs
  attestation_enabled:
    description: Set to 'false' to skip SLSA build-provenance attestation + verification. Default 'true'.
    default: 'true'
  failure_severity:
    description: >
      Trivy severities that fail the build and block the push. Must be one of
      'CRITICAL', 'CRITICAL,HIGH' or 'CRITICAL,HIGH,MEDIUM' (no spaces), matching
      the Java publish path. Defaults to CRITICAL,HIGH. DO NOT drop HIGH (i.e. set
      'CRITICAL') unless a vulnerability_exception_ticket is supplied.
    default: CRITICAL,HIGH
  vulnerability_exception_ticket:
    description: >
      Jira ticket link justifying a CRITICAL-only failure_severity, e.g.
      https://thetradedesk.atlassian.net/browse/UID2-1234. Required
      and format-validated only when failure_severity is 'CRITICAL' (HIGH dropped);
      the default CRITICAL,HIGH floor ignores it. Format-check only — no live Jira call.
    default: ''

outputs:
  tags:
    description: The docker image tags
    value: ${{ steps.meta.outputs.tags }}

runs:
  using: "composite"

  steps:
    # Fail fast (before the build) if this publish drops HIGH from the vuln floor
    # without a tracked Jira exception. Logic + tests live in the script so it is
    # unit-testable; inputs go via env, never interpolated into run:.
    - name: Validate vulnerability floor + exception ticket
      shell: bash
      env:
        FAILURE_SEVERITY: ${{ inputs.failure_severity }}
        EXCEPTION_TICKET: ${{ inputs.vulnerability_exception_ticket }}
      run: bash "${{ github.action_path }}/validate_vuln_floor.sh"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Log in to the Docker container registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ inputs.docker_registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.github_token }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ inputs.docker_registry }}/${{ inputs.docker_image_name }}
        tags: |
          type=raw,value=${{ inputs.image_tag }}
          type=raw,value=${{ inputs.not_snapshot == 'true' && 'latest' || '' }}

    - name: Extract First Image Tag
      id: extractImageTag
      shell: bash
      run: |
        FIRST_TAG=${DOCKER_METADATA_OUTPUT_TAGS%%$'\n'*}
        echo "firstTag=$FIRST_TAG" >> $GITHUB_OUTPUT

    - name: Lowercase image reference
      id: imageRef
      shell: bash
      run: |
        value="$(printf '%s' '${{ inputs.docker_registry }}/${{ inputs.docker_image_name }}' | tr '[:upper:]' '[:lower:]')"
        echo "value=${value}" >> "$GITHUB_OUTPUT"

    - name: Build and export to Docker
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: ${{ inputs.docker_context }}
        file: ${{ inputs.docker_file }}
        load: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          JAR_VERSION=${{ inputs.new_version }}
          IMAGE_VERSION=${{ inputs.new_version }}

    - name: Vulnerability scan
      uses: IABTechLab/uid2-shared-actions/actions/vulnerability_scan@v3
      with:
        publish_vulnerabilities: ${{ inputs.publish_vulnerabilities }}
        failure_severity: ${{ inputs.failure_severity }}
        scan_severity: CRITICAL,HIGH
        image_ref: ${{ steps.extractImageTag.outputs.firstTag }}
        scan_type: ${{ inputs.scan_type }}

    - name: Push to Docker (by digest, untagged)
      id: push
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: ${{ inputs.docker_context }}
        file: ${{ inputs.docker_file }}
        labels: ${{ steps.meta.outputs.labels }}
        outputs: type=image,name=${{ steps.imageRef.outputs.value }},push-by-digest=true,push=true
        build-args: |
          JAR_VERSION=${{ inputs.new_version }}
          IMAGE_VERSION=${{ inputs.new_version }}

    - name: Attest build provenance
      if: ${{ inputs.not_snapshot == 'true' && inputs.attestation_enabled == 'true' }}
      uses: IABTechLab/uid2-shared-actions/actions/attest_image@v3
      with:
        subject_name: ${{ inputs.docker_registry }}/${{ inputs.docker_image_name }}
        subject_digest: ${{ steps.push.outputs.digest }}

    - name: Promote digest to consumable tag(s)
      shell: bash
      env:
        DIGEST: ${{ steps.push.outputs.digest }}
        TAGS: ${{ steps.meta.outputs.tags }}
        SOURCE: ${{ steps.imageRef.outputs.value }}
      run: |
        set -euo pipefail
        while IFS= read -r tag; do
          [[ -z "$tag" ]] && continue
          docker buildx imagetools create -t "$tag" "${SOURCE}@${DIGEST}"
        done <<< "$TAGS"

name: Commit, create PR, and merge it
description: Commits changes, creates PR with that commit, and merges the PR

inputs:
  message:
    description: Message for commit and PR title
    required: false
    default: Automated update
  no_jira_reason:
    description: >-
      Reason recorded in the [no-jira - reason: <reason>] marker appended to the
      commit message. These commits are automated and carry no Jira key, so the
      marker is a reasoned opt-out that satisfies the require_jira_key ruleset on
      the default branch (UID2-7400 / UID2-7312). When `tag` is set it is
      appended to the reason (e.g. "automated release v1.2.3") so the marker is
      self-describing. Override to give a more specific reason; must be
      non-empty.
    required: false
    default: automated release
  tag:
    description: If provided, this tag is applied to the commit
    required: false
    default: ''
  add:
    description: Comma- or newline-separated list of paths to add
    required: true
  base_branch:
    description: The base branch we want to merge into
    type: string
    default: ''
  admin_access:
    description: Allow merging PR with `--admin` flag
    type: boolean
    required: false
    default: false
  github_token:
    description: The github token used to merge PR
    type: string
    required: false
    default: ''
outputs:
  git_tag_or_hash: 
    description: The git tag (or hash if no tag provided) of the merge commit
    value: ${{ steps.tag-commit.outcome == 'success' && steps.tag-commit.outputs.commit_tag || steps.get-commit-sha.outputs.commit_sha }}
  commit_sha:
    description: The git hash of the merge commit
    value: ${{ steps.get-commit-sha.outputs.commit_sha }}

runs:
  using: "composite"

  steps:
    - name: Check for changes
      id: changes
      shell: bash
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          echo "changes_exist=true" >> $GITHUB_OUTPUT
        fi

    - name: Generate branch name
      id: branch
      shell: bash
      run: echo "name=ci-${{ github.sha }}-${RANDOM}" >> $GITHUB_OUTPUT

    - name: Compose commit message
      id: compose
      shell: bash
      env:
        MESSAGE: ${{ inputs.message }}
        NO_JIRA_REASON: ${{ inputs.no_jira_reason }}
        TAG: ${{ inputs.tag }}
      run: |
        # Single source of truth for the CI commit message. The trailing
        # [no-jira - reason: <reason>] marker satisfies the require_jira_key
        # commit-message ruleset on the default branch (UID2-7400 / UID2-7312):
        # these commits are automated and have no Jira key, so they carry a
        # reasoned opt-out instead. Reused for the branch commit and the squash
        # commit (see the Merge PR step).
        #
        # Fail fast on an empty/whitespace reason: the ruleset requires a
        # non-empty reason (\S), so "[no-jira - reason: ]" would otherwise be
        # rejected at merge - far from the cause. Turn that into a clear error.
        if [[ -z "${NO_JIRA_REASON//[[:space:]]/}" ]]; then
          echo "::error::no_jira_reason must be non-empty"
          exit 1
        fi

        # Weave the release tag (e.g. v1.2.3) into the reason when present, so
        # the marker is self-describing in the audit archive - UID2-7400 asks
        # for "automated release vX.Y.Z". Non-release commits (pre-release /
        # snapshot) pass no tag and keep the bare reason.
        reason="$NO_JIRA_REASON"
        if [[ -n "$TAG" ]]; then
          reason="$reason $TAG"
        fi

        message="[CI Pipeline] ${MESSAGE} [no-jira - reason: ${reason}]"

        # Guard the core invariant before it ships: the composed message must
        # match the require_jira_key ruleset regex, which is enforced in a
        # separate repo (uid2-okta-configuration). A drift here - spacing, the
        # dash, a bracket - passes YAML/bash checks but would only surface as a
        # merge rejection across every @v3 consumer ("all releases blocked").
        # Assert against the exact pattern so drift fails here instead. Pin a
        # UTF-8 locale: grep -P (PCRE) errors under a non-UTF-8 locale.
        if ! printf '%s' "$message" | LC_ALL=C.UTF-8 grep -Pq 'UID2-[0-9]+|\[no-jira - reason:\s*\S[^\]]*\]'; then
          echo "::error::composed commit message does not satisfy the require_jira_key ruleset: ${message}"
          exit 1
        fi

        # Use the heredoc delimiter form (not single-line key=value): a message
        # containing a newline would otherwise be truncated at the first \n,
        # silently dropping the trailing marker.
        {
          echo "message<<__COMMIT_MSG_EOF__"
          echo "$message"
          echo "__COMMIT_MSG_EOF__"
        } >> "$GITHUB_OUTPUT"

    - name: Commit to new branch
      uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
      if: steps.changes.outputs.changes_exist == 'true'
      id: create-branch-and-commit
      with:
        message: ${{ steps.compose.outputs.message }}
        author_name: Release Workflow
        author_email: unifiedid-admin+release@thetradedesk.com
        new_branch: ${{ steps.branch.outputs.name }}
        add: ${{ inputs.add }}

    - name: Create PR
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      if: steps.changes.outputs.changes_exist == 'true'
      id: create-pr
      with:
        script: |
          const newPr = (await github.rest.pulls.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '[CI Pipeline] ${{ inputs.message }}',
            head: '${{ steps.branch.outputs.name }}',
            base: '${{ inputs.base_branch == '' && github.ref_name || inputs.base_branch }}',
            body: '[CI Pipeline] Automated update'
          })).data;
          core.setOutput('pull-request-url', newPr.html_url);
          core.setOutput('pull-request-number', newPr.number);

    - name: Merge PR
      if: steps.changes.outputs.changes_exist == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token == '' && github.token || inputs.github_token }}
        PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        BRANCH: ${{ steps.branch.outputs.name }}
        COMMIT_MESSAGE: ${{ steps.compose.outputs.message }}
      run: |
        # Squash-merge the PR.
        #
        # The flow always squashes - it does not pick merge/rebase by
        # branch-protection state. github.ref_protected only reflects *classic*
        # branch protection, not rulesets, so on the ruleset-governed default
        # branches we target it reads false and the old logic silently rebased;
        # the merge-commit path never fired. Squashing unconditionally makes the
        # result uniform across consumers regardless of how their default branch
        # is protected, and complies with the squash-only merge rule without
        # granting the release account a ruleset bypass.
        #
        # A squash merge lands a single commit whose message we set explicitly,
        # so it carries the require_jira_key marker (UID2-7400 / UID2-7312). The
        # ci-* branch also holds exactly one already-marked commit (see Compose
        # commit message), so the rule is satisfied whether GitHub evaluates the
        # resulting squash commit or every commit on the branch.
        gh api --method PUT \
          "repos/${{ github.repository }}/pulls/$PR_NUMBER/merge" \
          -f merge_method="squash" \
          -f commit_title="$COMMIT_MESSAGE" \
          -f commit_message="Automated release (PR #$PR_NUMBER)."

        # Delete the branch
        # || true - so the step doesn't fail if the branch is already deleted
        gh api --method DELETE \
          "repos/${{ github.repository }}/git/refs/heads/$BRANCH" || true
    
    - name: Tag commit
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      id: tag-commit
      if: ${{ inputs.tag != '' && steps.changes.outputs.changes_exist == 'true' }}
      with:
        script: |
          const pr = (await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: ${{ steps.create-pr.outputs.pull-request-number }}
          })).data;
          console.log(`Creating tag refs/tags/${{ inputs.tag }} pointing at commit SHA ${pr.merge_commit_sha}`);
          await github.rest.git.createRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: 'refs/tags/${{ inputs.tag }}',
            sha: pr.merge_commit_sha
          });
          core.setOutput('commit_tag', '${{ inputs.tag }}');

    - name: Get commit SHA
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      id: get-commit-sha
      if: steps.changes.outputs.changes_exist == 'true'
      with:
        script: |
          const pr = (await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: ${{ steps.create-pr.outputs.pull-request-number }}
          })).data;
          console.log(`Returning commit SHA ${pr.merge_commit_sha}`);
          core.setOutput('commit_sha', pr.merge_commit_sha);

    - name: Print outputs
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      if: ${{ inputs.tag != '' && steps.changes.outputs.changes_exist == 'true' }}
      with:
        script: |
          console.log('Result', '${{ steps.tag-commit.outcome }}');
          console.log('Commit tag', '${{ steps.tag-commit.outputs.commit_tag }}');
          console.log('Commit sha', '${{ steps.get-commit-sha.outputs.commit_sha }}');